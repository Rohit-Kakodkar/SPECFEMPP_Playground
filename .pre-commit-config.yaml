# Pre-commit hooks for KCompressedViews
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.(md|rst)|LICENSE)$
      - id: end-of-file-fixer
        exclude: ^(.*\.(md|rst))$
      - id: check-yaml
        args: ['--unsafe']  # Allow custom tags in CMake YAML
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: mixed-line-ending
        args: ['--fix=lf']

  # C++ formatting with clang-format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: ['-i']
        files: \.(cpp|hpp|cc|cxx|h)$
        exclude: ^(build|cmake-build-.*)/

  # CMake formatting
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        # cmake-format will read settings from .cmake-format.yaml in the repo root
        args: [--in-place]
        files: (CMakeLists\.txt|\.cmake)$

  # Markdown formatting
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        args: ['--wrap', '100']
        additional_dependencies:
          - mdformat-gfm
          - mdformat-black
        files: \.(md|markdown)$
        exclude: ^(CHANGELOG\.md)$

  # Python code formatting (if you have any Python scripts)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Spell checking (optional - uncomment if desired)
  # - repo: https://github.com/codespell-project/codespell
  #   rev: v2.2.6
  #   hooks:
  #     - id: codespell
  #       args: [--ignore-words-list=crate,nd,te,bu]
  #       exclude: ^(.*\.(svg|lock|json)|\.git/.*|build.*)$

# Configuration for pre-commit ci
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
